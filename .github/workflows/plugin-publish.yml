name: Plugin CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Validate Python
        run: |
          python -m py_compile strategies/skill_agent.py skills/package_store.py skills/runtime_workspace.py
          python -m unittest discover -s tests -v

      - name: Lint
        run: ruff check strategies/skill_agent.py skills/runtime_workspace.py tests/test_runtime_workspace.py
